    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

<body>
    <header class="header" id="header">
        <div class="container header__inner">
            <a href="index.html" class="logo"><img src="assets/logo.png" alt="Yeahvin" class="logo__img"></a>
            <nav class="nav" id="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Accueil</a></li>
                    <li><a href="boutique.html" class="nav__link">Boutique</a></li>

                </div>
                <div class="similar-products section" id="similarProducts">
                    <h3 class="section__title">Vous aimerez aussi</h3>
                    <div class="products-grid" id="similarGrid"></div>
                </div>
            </div>

    <footer class="footer">

            <div class="footer__grid">

                <div class="footer__contact"><h4>Contact</h4><p>WhatsApp : <a href="https://wa.me/22377555575">+223 77 55 55 75</a></p></div>
